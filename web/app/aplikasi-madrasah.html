<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link Aplikasi Madrasah</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            DEFAULT: '#006C4F', // Warna hijau gelap utama (Emis)
                            light: '#E5F3EF',   // Warna latar ikon (hijau muda)
                            hover: '#005940'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #FAFBFC;
        }
        /* Custom scrollbar for better appearance */
        ::-webkit-scrollbar {
            width: 6px;
            height: 4px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
        /* Hide scrollbar for tabs but keep functionality */
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        /* Toast Animation */
        @keyframes slideUpFade {
            0% { opacity: 0; transform: translateY(20px) translateX(-50%); }
            15% { opacity: 1; transform: translateY(0) translateX(-50%); }
            85% { opacity: 1; transform: translateY(0) translateX(-50%); }
            100% { opacity: 0; transform: translateY(-20px) translateX(-50%); }
        }
        .toast-animate {
            animation: slideUpFade 3s ease-in-out forwards;
        }
    </style>
</head>
<body class="text-gray-800 antialiased min-h-screen flex flex-col">

    <!-- Wrapper Sticky Utama (Header & Pencarian) -->
    <div class="sticky top-0 z-40 bg-[#FAFBFC] w-full">
        
        <!-- Header Mengambang (Floating Card) -->
        <div class="max-w-5xl mx-auto px-3 md:px-8 pt-4 w-full">
            <header class="bg-white border border-gray-200 rounded-2xl px-3 md:px-4 py-3 md:py-3.5 flex items-center shadow-sm min-h-[64px] md:min-h-[72px]">
                <div class="flex items-center gap-3 w-full">
                    
                    <!-- Ikon Kotak (Home) -->
                    <div class="w-10 h-10 md:w-11 md:h-11 bg-brand rounded-xl flex items-center justify-center text-white shadow-sm flex-shrink-0">
                        <i data-lucide="home" class="w-5 h-5 md:w-6 md:h-6"></i>
                    </div>
                    
                    <!-- Judul & Breadcrumbs -->
                    <div class="flex flex-col justify-center">
                        <h1 class="text-base md:text-xl font-bold text-gray-900 leading-tight">Link Aplikasi Madrasah</h1>
                        <!-- Subtitle / Breadcrumbs -->
                        <div class="flex items-center gap-1.5 text-[11px] md:text-xs text-gray-500 mt-0.5 font-medium">
                            <span class="hover:text-brand cursor-pointer transition-colors">Beranda</span>
                            <i data-lucide="chevron-right" class="w-3 h-3"></i>
                            <span class="text-brand">40 link tersedia</span>
                        </div>
                    </div>
                </div>
            </header>
        </div>

        <!-- Area Pencarian & Tab Kategori -->
        <div id="sticky-header" class="w-full transition-all duration-200 border-b border-transparent bg-[#FAFBFC]">
            <div class="max-w-5xl mx-auto px-3 md:px-8 pt-3 pb-2 w-full">
                <!-- Pencarian -->
                <div class="relative mb-3">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i data-lucide="search" class="h-4 w-4 text-gray-400"></i>
                    </div>
                    <input type="text" id="searchInput" 
                        class="block w-full pl-9 pr-3 py-2 border border-gray-200 rounded-xl leading-5 bg-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-brand focus:border-brand text-sm transition-all shadow-sm" 
                        placeholder="Cari aplikasi atau deskripsi...">
                </div>

                <!-- Tab Kategori -->
                <div class="flex gap-2 overflow-x-auto scrollbar-hide pb-1" id="tabsContainer">
                    <!-- Tabs akan di-render di sini oleh JS -->
                </div>
            </div>
        </div>
    </div>

    <!-- Konten Utama (List Aplikasi) -->
    <main class="flex-grow w-full">
        <div class="max-w-5xl mx-auto px-3 md:px-8 pt-2 pb-12 w-full" id="contentContainer">
            <!-- Konten akan di-render di sini oleh JS -->
        </div>
    </main>

    <!-- Toast Container -->
    <div id="toastContainer" class="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 flex flex-col gap-2 pointer-events-none"></div>

    <script>
        // Data Aplikasi (Sesuai aslinya)
        const linksData = [
            // Emis
            { category: "Emis", title: "EMIS 4.0", url: "https://emis.kemenag.go.id/", desc: "Gerbang Data Pendidikan Kementerian Agama" },
            { category: "Emis", title: "EMIS GTK (Simpatika)", url: "https://emisgtk.kemenag.go.id/", desc: "Pusat Layanan GTK Madrasah" },
            { category: "Emis", title: "EMIS GTK (Imp)", url: "https://dev-emisgtk.kemenag.go.id/", desc: "Rumah Digital Guru dan Tenaga Pendidikan Madrasah" },
			{ category: "Emis", title: "Peta Situs EMIS GTK (Imp)", url: "https://dev-emisgtk.pages.dev/", desc: "Daftar semua menu dan panduan alur kerja" },
			{ category: "Emis", title: "Ijin Operasional", url: "https://ijopmadrasah.kemenag.go.id/", desc: "Layanan Izin Operasional Pendirian Madrasah" },
			{ category: "Emis", title: "MBG (Madrasah Sehat)", url: "https://appmadrasah.kemenag.go.id/madrasahsehat/login", desc: "Platform terintegrasi untuk Instrumen Stratifikasi UKS dan Makan Bergizi Gratis" },
			
            // Verval
            { category: "Verval", title: "SDM Pusdatin", url: "https://sdm.data.kemendikdasmen.go.id/", desc: "Jaringan Pengelola Data Pendidikan" },
            { category: "Verval", title: "PD Data", url: "https://pd.data.kemendikdasmen.go.id/", desc: "Dashboard Pengelolaan Data Peserta Didik" },
            { category: "Verval", title: "Cek NISN", url: "https://nisn.data.kemendikdasmen.go.id/", desc: "Pencarian Data Siswa Nasional" },
            { category: "Verval", title: "Verval PD", url: "https://vervalpd.data.kemendikdasmen.go.id/index.php/Csekolah", desc: "Verval Peserta Didik" },
            { category: "Verval", title: "Verval ATS", url: "https://ats.data.kemendikdasmen.go.id/", desc: "Verval Anak Tidak Sekolah" },
			{ category: "Verval", title: "Verval PTK", url: "https://vervalptk.data.kemendikdasmen.go.id/", desc: "Verval Pendidik Tenaga Kependidikan" },
			{ category: "Verval", title: "Verval Yayasan", url: "https://vervalyayasan.data.kemendikdasmen.go.id/", desc: "Sistem Verifikasi dan Validasi (Nomor Pokok Yayasan Pendidikan)" },
            
            // Ujian
            { category: "Ujian", title: "PDUM", url: "https://pdum.kemenag.go.id/", desc: "Pangkalan Data Ujian Madrasah" },
            { category: "Ujian", title: "ANBK", url: "https://anbk.kemendikdasmen.go.id/", desc: "Asesmen Nasional Berbasis Komputer" },
			{ category: "Ujian", title: "Simulasi ANBK", url: "https://pusmendik.kemendikdasmen.go.id/an/simulasi_akm", desc: "Simulasi" },
			{ category: "Ujian", title: "Dashboard Sulingjar", url: "https://dashboardslb.kemendikdasmen.go.id/login", desc: "Survei Lingkungan Belajar" },
			{ category: "Ujian", title: "Login Sulingjar", url: "https://surveilingkunganbelajar.kemendikdasmen.go.id/login", desc: "Survei Lingkungan Belajar" },
			{ category: "Ujian", title: "TKA", url: "https://tka.kemendikdasmen.go.id/", desc: "Tes Kemampuan Akademik" },
			{ category: "Ujian", title: "Simulasi TKA", url: "https://pusmendik.kemendikdasmen.go.id/tka/simulasi_tka", desc: "Simulasi" },
            
            // BOS & Bantuan
            { category: "BOS & Bantuan", title: "EDM", url: "https://edm-fe.erkam-v2.kemenag.go.id/login", desc: "Evaluasi Diri Madrasah" },
			{ category: "BOS & Bantuan", title: "E-RKAM", url: "https://frontend.erkam-v2.kemenag.go.id/login", desc: "Rencana Kerja Anggaran Madrasah Berbasis Elektronik" },
			{ category: "BOS & Bantuan", title: "Portal BOS", url: "https://bos.kemenag.go.id/", desc: "Bantuan Operasional Sekolah (BOS)" },
			{ category: "BOS & Bantuan", title: "PIP Madrasah", url: "https://pipmadrasah.kemenag.go.id/", desc: "Program Indonesia Pintar" },
			{ category: "BOS & Bantuan", title: "PIP Diknas", url: "https://pip.kemendikdasmen.go.id/home_v1", desc: "Program Indonesia Pintar" },
			{ category: "BOS & Bantuan", title: "KIP Kuliah", url: "https://kip-kuliah.kemdiktisaintek.go.id/", desc: "Kartu Indonesia Pintar Kuliah" },
			{ category: "BOS & Bantuan", title: "SimSarpras", url: "https://appmadrasah.kemenag.go.id/simsarpras/", desc: "Sistem Informasi Sarana dan Prasarana Madrasah" },
            
            // Pengembangan Diri
            { category: "Pengembangan Diri", title: "PPG Kemenag", url: "https://ppg.kemenag.go.id/", desc: "PPG Dalam Jabatan Transformasi+" },
			{ category: "Pengembangan Diri", title: "Pintar Kemenag", url: "https://pintar.kemenag.go.id/", desc: "Pusat Informasi Pelatihan & Pembelajaran" },
			{ category: "Pengembangan Diri", title: "KSM", url: "https://ksm.kemenag.go.id/", desc: "Kompetisi Sains Madrasah" },
			{ category: "Pengembangan Diri", title: "OMI", url: "https://omi.kemenag.go.id/", desc: "Olimpiade Madrasah Indonesia" },
            
            // Rapor & Ijazah
            { category: "Rapor & Ijazah", title: "Rapor RDM", url: "https://rdm.kemenag.go.id/", desc: "Rapor Digital Madrasah" },
            { category: "Rapor & Ijazah", title: "Portal Ijazah", url: "https://ijazah.data.kemendikdasmen.go.id/", desc: "Portal Data Induk Ijazah" },
			{ category: "Rapor & Ijazah", title: "Manajemen Ijazah", url: "https://ijazah.data.kemendikdasmen.go.id/manajemen/#/sign-in", desc: "Pengelolaan Data Induk Ijazah" },
            
            // Akreditasi
            { category: "Akreditasi", title: "BAN PDM", url: "https://ban-pdm.id/", desc: "Badan Akreditasi Nasional PDM" },
			{ category: "Akreditasi", title: "Sispena PDM", url: "https://apps.ban-pdm.id/sispena3/login", desc: "Sistem Penilaian Akreditasi" },
			{ category: "Akreditasi", title: "SiNaDita (Jatim)", url: "https://sinadita.banpdmjatim.id/login", desc: "Aplikasi Manajemen Akreditasi" },
            
            // Hiburan
            { category: "Hiburan", title: "KLTRA TV", url: "https://kltratvos.blogspot.com/p/homie.html", desc: "Free Streaming Sports" },
            { category: "Hiburan", title: "Streaming TV", url: "https://tv.tioprm.eu.org/", desc: "Streaming Televisi Indonesia Gratis" },
            { category: "Hiburan", title: "Murrotal Mp3", url: "https://murrotal30juz.netlify.app/", desc: "Murottal Al-Qur'an 30 Juz Audio Lengkap" }
        ];

        // Pemetaan Ikon Berdasarkan Kategori
        const categoryIcons = {
            "Emis": "database",
            "Verval": "check-circle",
            "Ujian": "graduation-cap",
            "BOS & Bantuan": "building-2",
            "Pengembangan Diri": "users",
            "Rapor & Ijazah": "book-open",
            "Akreditasi": "wallet",
            "Hiburan": "link"
        };

        // Ekstrak Kategori Unik dan tambahkan "Semua" di awal
        const categories = ["Semua", ...new Set(linksData.map(item => item.category))];

        // State Aplikasi
        let activeTab = "Semua";
        let searchQuery = "";

        // DOM Elements
        const tabsContainer = document.getElementById('tabsContainer');
        const contentContainer = document.getElementById('contentContainer');
        const searchInput = document.getElementById('searchInput');

        // Render Tabs
        function renderTabs() {
            tabsContainer.innerHTML = '';
            categories.forEach(cat => {
                const btn = document.createElement('button');
                
                // Styling berdasarkan dev-emisgtk2 (diperkecil dan dirapatkan)
                if (cat === activeTab) {
                    btn.className = "whitespace-nowrap px-3.5 py-1.5 rounded-full text-[13px] font-semibold transition-colors duration-200 bg-brand text-white border border-brand shadow-sm";
                } else {
                    btn.className = "whitespace-nowrap px-3.5 py-1.5 rounded-full text-[13px] font-medium transition-colors duration-200 bg-white text-gray-600 border border-gray-200 hover:bg-gray-50 hover:text-gray-900";
                }
                
                btn.textContent = cat;
                btn.onclick = () => {
                    activeTab = cat;
                    renderTabs(); // Re-render for styling
                    renderContent();
                };
                tabsContainer.appendChild(btn);
            });
        }

        // Render Kartu Aplikasi
        function createCardHTML(item) {
            const iconName = categoryIcons[item.category] || "external-link";
            
            return `
                <div class="bg-white border border-gray-200 rounded-xl p-3 flex items-center justify-between hover:border-brand hover:shadow-md transition-all duration-200 group cursor-pointer" onclick="window.open('${item.url}', '_blank')">
                    <div class="flex items-center gap-3">
                        <div class="w-9 h-9 md:w-10 md:h-10 rounded-full bg-brand-light flex items-center justify-center text-brand flex-shrink-0 group-hover:bg-brand group-hover:text-white transition-colors duration-200">
                            <i data-lucide="${iconName}" class="w-5 h-5"></i>
                        </div>
                        <div class="flex flex-col justify-center">
                            <h3 class="font-semibold text-gray-800 text-[13px] md:text-sm group-hover:text-brand transition-colors leading-tight">${item.title}</h3>
                            <p class="text-[11px] md:text-xs text-gray-500 mt-0.5 line-clamp-1 leading-tight">${item.desc}</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-0.5">
                        <!-- Tombol Salin Link -->
                        <button onclick="copyToClipboard(event, '${item.url}')" class="p-1.5 text-gray-400 hover:text-brand hover:bg-brand-light rounded-lg transition-colors" title="Salin Tautan">
                            <i data-lucide="copy" class="w-4 h-4"></i>
                        </button>
                        <!-- Ikon Panah -->
                        <div class="p-1.5 text-gray-300 group-hover:text-brand transition-colors">
                            <i data-lucide="chevron-right" class="w-4 h-4"></i>
                        </div>
                    </div>
                </div>
            `;
        }

        // Render Konten Utama
        function renderContent() {
            contentContainer.innerHTML = '';

            // Filter Data
            let filteredData = linksData.filter(item => {
                const matchTab = activeTab === "Semua" || item.category === activeTab;
                const matchSearch = item.title.toLowerCase().includes(searchQuery.toLowerCase()) || 
                                    item.desc.toLowerCase().includes(searchQuery.toLowerCase());
                return matchTab && matchSearch;
            });

            if (filteredData.length === 0) {
                contentContainer.innerHTML = `
                    <div class="text-center py-16 bg-white rounded-2xl border border-gray-200 border-dashed mt-4">
                        <div class="w-16 h-16 bg-gray-50 rounded-full flex items-center justify-center mx-auto mb-4 text-gray-400">
                            <i data-lucide="search-x" class="w-8 h-8"></i>
                        </div>
                        <h3 class="text-gray-900 font-semibold mb-1">Aplikasi tidak ditemukan</h3>
                        <p class="text-gray-500 text-sm">Coba gunakan kata kunci lain atau periksa kategori yang dipilih.</p>
                    </div>
                `;
                lucide.createIcons();
                return;
            }

            // Grouping jika tab "Semua", jika spesifik tab langsung list
            if (activeTab === "Semua") {
                // Group by category
                const groupedData = filteredData.reduce((acc, item) => {
                    if (!acc[item.category]) acc[item.category] = [];
                    acc[item.category].push(item);
                    return acc;
                }, {});

                for (const [category, items] of Object.entries(groupedData)) {
                    const sectionHTML = `
                        <div class="mb-6">
                            <h2 class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-3 px-1">${category}</h2>
                            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-2 gap-2.5 md:gap-3">
                                ${items.map(item => createCardHTML(item)).join('')}
                            </div>
                        </div>
                    `;
                    contentContainer.innerHTML += sectionHTML;
                }
            } else {
                // Tampilan List langsung tanpa label kategori
                const listHTML = `
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-2 gap-2.5 md:gap-3 mt-2">
                        ${filteredData.map(item => createCardHTML(item)).join('')}
                    </div>
                `;
                contentContainer.innerHTML = listHTML;
            }

            // Inisialisasi ulang icon Lucide setelah manipulasi DOM
            lucide.createIcons();
        }

        // Fungsi Salin Link
        function copyToClipboard(event, text) {
            // Mencegah trigger klik pada card (buka tab baru)
            event.stopPropagation(); 
            
            // Buat elemen textarea temporary
            var textArea = document.createElement("textarea");
            textArea.value = text;
            textArea.style.top = "0";
            textArea.style.left = "0";
            textArea.style.position = "fixed";
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();

            try {
                var successful = document.execCommand('copy');
                if(successful) {
                    showToast('Tautan berhasil disalin!');
                } else {
                    showToast('Gagal menyalin tautan.', true);
                }
            } catch (err) {
                showToast('Browser tidak mendukung penyalinan.', true);
            }

            document.body.removeChild(textArea);
        }

        // Fungsi Menampilkan Toast Notification
        function showToast(message, isError = false) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            
            toast.className = `toast-animate px-4 py-3 rounded-xl shadow-lg text-sm font-medium text-white flex items-center gap-3 w-max ${isError ? 'bg-red-600' : 'bg-gray-800'}`;
            
            const iconName = isError ? 'alert-circle' : 'check-circle-2';
            toast.innerHTML = `
                <i data-lucide="${iconName}" class="w-5 h-5"></i> 
                <span>${message}</span>
            `;
            
            container.appendChild(toast);
            lucide.createIcons(); // render icon di toast

            // Hapus elemen setelah animasi selesai
            setTimeout(() => {
                if (container.contains(toast)) {
                    container.removeChild(toast);
                }
            }, 3000);
        }

        // Event Listener Pencarian
        searchInput.addEventListener('input', (e) => {
            searchQuery = e.target.value;
            renderContent();
        });

        // Event Scroll untuk Efek Sticky Header (Menambahkan shadow saat di-scroll)
        window.addEventListener('scroll', () => {
            const stickyHeader = document.getElementById('sticky-header');
            if (window.scrollY > 15) {
                stickyHeader.classList.add('shadow-[0_10px_20px_-10px_rgba(0,0,0,0.08)]');
                stickyHeader.classList.replace('border-transparent', 'border-gray-200');
            } else {
                stickyHeader.classList.remove('shadow-[0_10px_20px_-10px_rgba(0,0,0,0.08)]');
                stickyHeader.classList.replace('border-gray-200', 'border-transparent');
            }
        });

        // Inisialisasi saat load
        document.addEventListener('DOMContentLoaded', () => {
            renderTabs();
            renderContent();
            lucide.createIcons();
        });
    </script>
</body>
</html>
